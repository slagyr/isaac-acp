name: CI Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      NO_COLOR: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # Sibling checkouts: the :spec/:features aliases reference ../isaac-agent/spec
      # (step defs, marigold.agent) and ../isaac-agent/modules/isaac.comm.telly as
      # raw paths, so the sibling repos must be present alongside isaac-acp.
      - name: Check out isaac-foundation
        run: git clone --depth 1 https://github.com/slagyr/isaac-foundation.git ../isaac-foundation

      - name: Check out isaac-agent
        run: git clone --depth 1 https://github.com/slagyr/isaac-agent.git ../isaac-agent

      - name: Check out isaac-server
        run: git clone --depth 1 https://github.com/slagyr/isaac-server.git ../isaac-server

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Clojure and Babashka
        uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest

      - name: Cache Clojure dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: ${{ runner.os }}-clojure-${{ hashFiles('**/deps.edn', '**/bb.edn') }}
          restore-keys: |
            ${{ runner.os }}-clojure-

      - name: Run specs
        run: clojure -M:spec

      - name: Run features
        run: clojure -M:features
